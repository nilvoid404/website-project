<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="calculator.css">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <h3 class="nav-bar"><a href="index.html"><i class="fa-solid fa-house"></i></a></h3>
<div id="calculator">
<input id="display" placeholder="0" readonly>
<div id="keys">
    <button onclick="appendToDisplay('*')" class="operator-button">x</button>
    <button onclick="appendToDisplay('9')">9</button>
    <button onclick="appendToDisplay('8')">8</button>
    <button onclick="appendToDisplay('7')">7</button>
    <button onclick="appendToDisplay('-')" class="operator-button">-</button>
    <button onclick="appendToDisplay('6')">6</button>
    <button onclick="appendToDisplay('5')">5</button>
    <button onclick="appendToDisplay('4')">4</button>
    <button onclick="appendToDisplay('+')" class="operator-button">+</button>
    <button onclick="appendToDisplay('3')">3</button>
    <button onclick="appendToDisplay('2')">2</button>
    <button onclick="appendToDisplay('1')">1</button>
    <button onclick="appendToDisplay('/')" class="operator-button">/</button>
    <button onclick="appendToDisplay('0')">0</button>
    <button onclick="appendToDisplay('.')">.</button>
    <button onclick="calculate('')">=</button>
    <button onclick="clearDisplay('')" class="operator-button">C</button>
    

</div>


</div>

    <script src="calculator.js"></script>
</body>
</html>
